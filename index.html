<!doctype html>

    <meta charset="UTF-8" />
    <title>Sahil Shirke | Tech Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        overflow-x: hidden;
        color: #fff;
        background: #020617;
      }

      body::before,
      body::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
      }

      body::before {
        background-image: linear-gradient(
          120deg,
          rgba(56, 189, 248, 0.15) 1px,
          transparent 1px
        );
        background-size: 50px 50px;
        animation: gridMove 20s linear infinite;
      }

      body::after {
        background:
          radial-gradient(
            circle at 20% 30%,
            rgba(56, 189, 248, 0.18),
            transparent 40%
          ),
          radial-gradient(
            circle at 80% 70%,
            rgba(56, 189, 248, 0.15),
            transparent 45%
          );
        animation: floatGlow 8s ease-in-out infinite alternate;
      }

      @keyframes gridMove {
        from {
          background-position: 0 0;
        }
        to {
          background-position: -600px 600px;
        }
      }

      @keyframes floatGlow {
        from {
          transform: translateY(-20px);
        }
        to {
          transform: translateY(20px);
        }
      }

      .container {
        width: 100%;
        display: flex;
      }

      .menu {
        width: 18%;
        padding: 25px;
        background: rgba(2, 6, 23, 0.9);
        backdrop-filter: blur(10px);
        border-right: 1px solid rgba(56, 189, 248, 0.4);
      }

      .menu h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #38bdf8;
        letter-spacing: 3px;
      }

      .menu button {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        background: transparent;
        border: 1px solid #38bdf8;
        color: #38bdf8;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.3s;
      }

      .menu button:hover {
        background: #38bdf8;
        color: #000;
        box-shadow: 0 0 20px #38bdf8;
      }

      .center {
        width: 32%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .profile {
        text-align: center;
      }

      .profile img {
        width: 220px;
        height: 220px;
        border-radius: 50%;
        border: 4px solid #38bdf8;
        object-fit: cover;
        box-shadow: 0 0 40px rgba(56, 189, 248, 0.7);
        animation: pulse 3s infinite;
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 20px #38bdf8;
        }
        50% {
          box-shadow: 0 0 50px #38bdf8;
        }
        100% {
          box-shadow: 0 0 20px #38bdf8;
        }
      }

      .profile h1 {
        margin-top: 15px;
      }

      .profile p {
        color: #94a3b8;
        font-size: 14px;
      }

      .content {
        width: 50%;
        padding: 30px;
      }

      .box {
        background: rgba(2, 6, 23, 0.85);
        backdrop-filter: blur(10px);
        padding: 25px;
        border-radius: 18px;
        min-height: 380px;
        border: 1px solid rgba(56, 189, 248, 0.35);
      }

      h3 {
        color: #38bdf8;
        margin-bottom: 12px;
      }

      ul {
        margin-left: 18px;
      }

      li {
        margin: 10px 0;
        line-height: 1.6;
      }

      a {
        color: #38bdf8;
        text-decoration: none;
      }

      /* ✅ Hover Effect */
      a:hover {
        opacity: 0.8;
        text-decoration: underline;
      }

      @media (max-width: 900px) {
        body {
          overflow-y: auto;
        }
        .container {
          flex-direction: column;
        }

        .menu {
          width: 100%;
          display: flex;
          flex-wrap: wrap;
          justify-content: center;
          border-right: none;
          border-bottom: 1px solid rgba(56, 189, 248, 0.3);
        }

        .menu h2 {
          width: 100%;
          margin-bottom: 10px;
        }

        .menu button {
          width: 45%;
          margin: 6px;
        }

        .center {
          width: 100%;
          margin: 20px 0;
        }

        .content {
          width: 100%;
          padding: 20px;
        }

        .profile img {
          width: 180px;
          height: 180px;
        }
      }
    </style>
  </head>
